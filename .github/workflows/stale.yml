name: Mark stale issues and pull requests

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  stale:
    permissions:
      issues: write # for actions/stale to close stale issues
      pull-requests: write # for actions/stale to close stale PRs
    runs-on: ubuntu-24.04
    outputs:
      staled_prs: ${{ steps.filter-prs.outputs.result }}

    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v10
        id: stale
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-pr-message: "Этот PR был неактивен достаточно долго, чтобы быть автоматически помеченным как устаревший. Это означает, что он рискует быть автоматически закрытым через ~7 дней, пожалуйста, рассмотрите все нерешенные вопросы по проверке и убедитесь, что ваш PR завершен, если все это верно и вы все равно автоматически заблокированы, вам нужно активно спрашивать Мейнтейнеров, будет ли ваш PR вмержен. Как только вы выполните любое из предыдущих действий, вам следует попросить сопровождающего удалить устаревшую метку с вашего PR, чтобы сбросить устаревший таймер. Если вы чувствуете, что ни один из сопровождающих не ответит в течение этого времени, вы можете закрыть этот PR самостоятельно, пока будете запрашивать комментарий у мейнтейнера, так как тогда вы сможете снова открыть PR самостоятельно"
          stale-issue-message: "Этот баг-репорт был помечен как устраненный и будет автоматически закрыт чеерз 14 дней. Если проблема все еще актуальна, то сообщите об этом Мейнтейнерам, обновив свой баг-репорт новой информацией об ошибке, для того чтобы снять эту метку"
          days-before-stale: 7
          days-before-close: 14
          stale-pr-label: "Застоялось"
          days-before-issue-stale: 14
          days-before-issue-close: 14
          stale-issue-label: "Застоявшийся баг-репорт"
          remove-issue-stale-when-updated: false
          exempt-issue-labels: "RED LABEL"
          exempt-pr-labels: "RED LABEL,Неплохой Первый пулл-реквест"
          operations-per-run: 300
      - name: Filter staled pull requests for announcement
        id: filter-prs
        uses: actions/github-script@v8
        with:
          script: |
            return JSON.parse(`${{steps.stale.outputs.staled-issues-prs}}`)
                       .filter(issue => !!issue.pull_request)
                       .map(pr => ({
                        title: pr.title,
                        number: pr.number,
                        html_url: pr.pull_request.html_url,
                       }));

  announce:
    runs-on: ubuntu-24.04
    needs: stale
    if: ${{ needs.stale.outputs.staled_prs != '[]' }}
    strategy:
      matrix:
        pull_request: ${{ fromJSON(needs.stale.outputs.staled_prs) }}
    steps:
      - name: "Check for DISCORD_WEBHOOK"
        id: secrets_set
        env:
          ENABLER_SECRET: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          unset SECRET_EXISTS
          if [ -n "$ENABLER_SECRET" ]; then SECRET_EXISTS=true ; fi
          echo "SECRETS_ENABLED=$SECRET_EXISTS" >> $GITHUB_OUTPUT
      - name: Send Discord notification
        uses: tgstation/discord-notify@v3
        if: >
          steps.secrets_set.outputs.SECRETS_ENABLED
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          title: ${{ matrix.pull_request.title }}
          message: ${{ format('**Pull Request \#{0} automatically marked as stale.**', matrix.pull_request.number) }}
          include_image: false
          show_author: false
          avatar_url: https://avatars.githubusercontent.com/u/1363778?s=200&v=4
          username: GitHub
          title_url: "${{ matrix.pull_request.html_url }}"
